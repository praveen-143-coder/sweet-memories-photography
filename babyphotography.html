<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Baby Photography in Tirupati | Sweet Memories Photography</title>
<meta name="description" content="Professional baby photography in Tirupati. Newborn, infant, family and cake smash photoshoots with love and care.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#fffaf4;color:#1c1c1c;line-height:1.7;}

/* ================= HERO ================= */
.hero{
  padding:80px 16px 50px;
  text-align:center;
}
.hero h1{font-size:40px;font-weight:600;}
.hero p{
  margin-top:14px;
  max-width:780px;
  margin-inline:auto;
  color:#555;
}
img {
  min-height: 1px;
  backface-visibility: hidden;
}


/* ================= FILTERS ================= */
.filters{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin:10px auto 30px;
}
.filters button{
  padding:10px 22px;
  border:none;
  border-radius:30px;
  background:#fff;
  cursor:pointer;
  font-weight:500;
  transition:.3s;
}
.filters button.active,
.filters button:hover{
  background:#c89b3c;
  color:#fff;
}

/* ================= GALLERY ================= */
.section{max-width:1200px;margin:auto;padding:40px 16px;}
.gallery{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}
.gallery-item{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
}
.gallery-item img{
  width:100%;
  height:260px;
  object-fit:cover;
  transition:.4s ease;
}
.gallery-item:hover img{
  transform:scale(1.08);
}

/* ================= LIGHTBOX ================= */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}
.lightbox img{
  max-width:90%;
  max-height:70vh;
  border-radius:14px;
}
.lightbox .caption{
  color:#fff;
  margin-top:12px;
  font-size:14px;
}
.lightbox span,
.lightbox button{
  position:absolute;
  color:#fff;
  background:none;
  border:none;
  cursor:pointer;
}
.lightbox span{
  top:20px;
  right:24px;
  font-size:32px;
}
#prev{left:20px;top:50%;font-size:40px;}
#next{right:20px;top:50%;font-size:40px;}

/* ================= STICKY CTA ================= */
.sticky-cta{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#c89b3c;
  color:#fff;
  padding:14px 24px;
  border-radius:40px;
  text-decoration:none;
  font-weight:500;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  z-index:999;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .hero h1{font-size:26px;}
  .hero p{font-size:14px;}
  .gallery{grid-template-columns:repeat(2,1fr);}
  .gallery-item img{height:140px;}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Baby Photography</h1>
  <p>
    Capturing tiny smiles, first expressions and beautiful baby moments with
    love, patience and professional care in Tirupati.
  </p>
</section>

<!-- FILTERS -->
<div class="filters">
  <button class="active" data-filter="all">All</button>
  <button data-filter="newborn">Newborn</button>
  <button data-filter="infant">Infant</button>
  <button data-filter="family">Family</button>
  <button data-filter="cake">Cake Smash</button>
</div>

<!-- GALLERY -->
<section class="section">
  <div class="gallery" id="gallery"></div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span id="close">&times;</span>
  <button id="prev">&#10094;</button>
  <img id="lightImg">
  <div class="caption" id="caption"></div>
  <button id="next">&#10095;</button>
</div>

<!-- STICKY CTA -->
<a href="enquiry.html" class="sticky-cta">🍼 Book Baby Shoot</a>

<script>

  let currentFilter = "all";
let loading = false;

/* ================= BABY IMAGE DATA ================= */
const images=[
  {src:"gallery/babyphotography/newbornbabyimage1.jpeg",cat:"newborn",cap:"Newborn baby photography"},
  {src:"gallery/babyphotography/newbornbabyimage2.jpeg",cat:"newborn",cap:"Sleeping newborn pose"},
  {src:"gallery/babyphotography/babyphotography11.jpg",cat:"infant",cap:"Infant baby portrait"},
  {src:"gallery/babyphotography/babyphotography9.jpg",cat:"infant",cap:"Cute baby smile"},
  {src:"gallery/babyphotography/babyfamilyfamilyimage1.jpeg",cat:"family",cap:"Baby photoshoot with parents"},
  {src:"gallery/babyphotography/babyfamilyimage2.jpeg",cat:"family",cap:"Family baby moments"},
  {src:"gallery/babyphotography/babyfamilyimage3.jpeg",cat:"family",cap:"Family baby moments"},
  {src:"gallery/babyphotography/cakeimage1.jpg",cat:"cake",cap:"Cake smash photoshoot"},
  {src:"gallery/babyphotography/cakeimage2.jpg",cat:"cake",cap:"First birthday cake smash"}
];

let visibleCount=6;
const gallery=document.getElementById("gallery");

/* ================= RENDER ================= */
function render(filter = "all", append = false) {
  if (!append) gallery.innerHTML = "";

  const filtered = images.filter(
    img => filter === "all" || img.cat === filter
  );

  const start = append ? visibleCount - 4 : 0;
  const end = visibleCount;

  filtered.slice(start, end).forEach(img => {
    const realIndex = images.indexOf(img);

    gallery.insertAdjacentHTML("beforeend", `
      <div class="gallery-item" data-index="${realIndex}">
        <img src="${img.src}" loading="lazy">
      </div>
    `);
  });
}
render();


/* ================= FILTER ================= */
document.querySelectorAll(".filters button").forEach(btn => {
  btn.addEventListener("click", () => {

    document.querySelectorAll(".filters button")
      .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    currentFilter = btn.dataset.filter;
    visibleCount = 6;

    render(currentFilter);
  });
});


/* ================= INFINITE SCROLL ================= */
window.addEventListener("scroll", () => {
  if (loading || lightbox.style.display === "flex") return;

  const reachedBottom =
    window.innerHeight + window.scrollY >=
    document.documentElement.scrollHeight - 120;

  if (reachedBottom) {
    loading = true;
    visibleCount += 4;
    render(currentFilter, true);

    setTimeout(() => loading = false, 200);
  }
});



/* ================= LIGHTBOX ================= */
const lightbox=document.getElementById("lightbox");
const lightImg=document.getElementById("lightImg");
const caption=document.getElementById("caption");
let currentIndex=0;

gallery.onclick=e=>{
  const item=e.target.closest(".gallery-item");
  if(!item) return;
  currentIndex=item.dataset.index;
  open();
};

function open(){
  lightbox.style.display="flex";
  lightImg.src=images[currentIndex].src;
  caption.innerText=images[currentIndex].cap;
  // 🔒 Lock background scroll
  document.body.style.overflow = "hidden";
}
document.getElementById("close").onclick = () => {
  lightbox.style.display = "none";

  // 🔓 Restore background scroll
  document.body.style.overflow = "";
};
document.getElementById("next").onclick=()=>{currentIndex=(+currentIndex+1)%images.length;open();}
document.getElementById("prev").onclick=()=>{currentIndex=(currentIndex-1+images.length)%images.length;open();}

/* Swipe (mobile) */
let startX=0;
lightImg.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
lightImg.addEventListener("touchend",e=>{
  let diff=startX-e.changedTouches[0].clientX;
  if(Math.abs(diff)>50) diff>0?next.click():prev.click();
});
</script>

</body>
</html>

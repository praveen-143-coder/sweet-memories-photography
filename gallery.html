<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Photography Gallery | Sweet Memories Photography – Tirupati</title>
<meta name="description" content="Explore wedding, baby, maternity and model photography gallery by Sweet Memories Photography in Tirupati.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#fffaf4;color:#1c1c1c;line-height:1.7;}

/* ================= HERO ================= */
.hero{
  padding:80px 16px 50px;
  text-align:center;
}
.hero h1{font-size:42px;font-weight:600;}
.hero p{
  margin-top:14px;
  max-width:780px;
  margin-inline:auto;
  color:#555;
}

img {
  min-height: 1px;
  backface-visibility: hidden;
}

/* ================= FILTERS ================= */
.filters{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin:10px auto 30px;
}
.filters button{
  padding:10px 22px;
  border:none;
  border-radius:30px;
  background:#fff;
  cursor:pointer;
  font-weight:500;
  transition:.3s;
}
.filters button.active,
.filters button:hover{
  background:#c89b3c;
  color:#fff;
}

/* ================= GALLERY ================= */
.section{max-width:1200px;margin:auto;padding:40px 16px;}
.gallery{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}
.gallery-item{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
}
.gallery-item img{
  width:100%;
  height:260px;
  object-fit:cover;
  transition:.4s ease;
}
.gallery-item:hover img{
  transform:scale(1.08);
}

/* ================= LIGHTBOX ================= */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}
.lightbox img{
  max-width:90%;
  max-height:70vh;
  border-radius:14px;
}
.lightbox .caption{
  color:#fff;
  margin-top:12px;
  font-size:14px;
}
.lightbox span,
.lightbox button{
  position:absolute;
  color:#fff;
  background:none;
  border:none;
  cursor:pointer;
}
.lightbox span{
  top:20px;
  right:24px;
  font-size:32px;
}
#prev{left:20px;top:50%;font-size:40px;}
#next{right:20px;top:50%;font-size:40px;}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .hero h1{font-size:26px;}
  .hero p{font-size:14px;}
  .gallery{grid-template-columns:repeat(2,1fr);}
  .gallery-item img{height:140px;}
}
/* ================= STICKY CTA ================= */
.sticky-cta{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#c89b3c;
  color:#fff;
  padding:14px 24px;
  border-radius:40px;
  text-decoration:none;
  font-weight:500;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  z-index:999;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .hero h1{font-size:26px;}
  .hero p{font-size:14px;}
  .gallery{grid-template-columns:repeat(2,1fr);}
  .gallery-item img{height:140px;}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Our Photography Gallery</h1>
  <p>
    Explore our wedding, Engagement, Pre Wedding and Reception photography gallery,
    crafted with emotion, creativity and professional storytelling.
  </p>
</section>

<!-- FILTERS -->
<div class="filters">
  <button class="active" data-filter="all">All</button>
  <button data-filter="engagement">Engagement</button>
  <button data-filter="prewedding">Pre Wedding</button>
  <button data-filter="wedding">Wedding</button>
  <button data-filter="reception">Reception</button>
</div>

<!-- GALLERY -->
<section class="section">
  <div class="gallery" id="gallery"></div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span id="close">&times;</span>
  <button id="prev">&#10094;</button>
  <img id="lightImg">
  <div class="caption" id="caption"></div>
  <button id="next">&#10095;</button>
</div>
<!-- STICKY CTA -->
<a href="enquiry.html" class="sticky-cta"> Book your Photo Shoot</a>

<script>
  let currentFilter = "all";

/* ================= GALLERY DATA ================= */
const images=[
  {src:"gallery/galleryimagesinner/engagementimage1.jpeg",cat:"engagement",cap:""},
  {src:"gallery/galleryimagesinner/engagementimage2.jpeg",cat:"engagement",cap:""},
  {src:"gallery/galleryimagesinner/engagementimage3.jpeg",cat:"engagement",cap:""},
  {src:"gallery/galleryimagesinner/engagementimage4.jpeg",cat:"engagement",cap:""},
   {src:"gallery/galleryimagesinner/preweddingimage1.jpeg",cat:"prewedding",cap:""},
  {src:"gallery/galleryimagesinner/preweddingimage2.jpeg",cat:"prewedding",cap:""},
   {src:"gallery/galleryimagesinner/preweddingimage3.jpeg",cat:"prewedding",cap:""},
  {src:"gallery/galleryimagesinner/preweddingimage4.jpeg",cat:"prewedding",cap:""},
  {src:"gallery/galleryimagesinner/preweddingimage5.jpeg",cat:"prewedding",cap:""},
  {src:"gallery/galleryimagesinner/preweddingimage6.jpeg",cat:"prewedding",cap:""},
  {src:"gallery/galleryimagesinner/preweddingimage7.jpeg",cat:"prewedding",cap:""},
  {src:"gallery/galleryimagesinner/preweddingimage8.jpeg",cat:"prewedding",cap:""},
  {src:"gallery/galleryimagesinner/preweddingimage9.jpeg",cat:"prewedding",cap:""},
  {src:"gallery/galleryimagesinner/preweddingimage10.jpeg",cat:"prewedding",cap:""},
  {src:"gallery/galleryimagesinner/preweddingimage11.jpeg",cat:"prewedding",cap:""},
  {src:"gallery/galleryimagesinner/weddingimage1.jpeg",cat:"wedding",cap:""},
  {src:"gallery/galleryimagesinner/weddingimage2.jpeg",cat:"wedding",cap:""},
  {src:"gallery/galleryimagesinner/weddingimage3.jpeg",cat:"wedding",cap:""},
  {src:"gallery/galleryimagesinner/weddingimage4.jpeg",cat:"wedding",cap:""},
  {src:"gallery/galleryimagesinner/weddingimage5.jpeg",cat:"wedding",cap:""},
  {src:"gallery/galleryimagesinner/receptionimage1.jpeg",cat:"reception",cap:""},
  {src:"gallery/galleryimagesinner/receptionimage2.jpeg",cat:"reception",cap:""},
  {src:"gallery/galleryimagesinner/receptionimage3.jpeg",cat:"reception",cap:""},
  {src:"gallery/galleryimagesinner/receptionimage4.jpeg",cat:"reception",cap:""},
];

let visibleCount=6;
const gallery=document.getElementById("gallery");

/* ================= RENDER ================= */

function render(filter = "all", append = false) {
  if (!append) gallery.innerHTML = "";

  images
    .filter(i => filter === "all" || i.cat === filter)
    .slice(append ? visibleCount - 4 : 0, visibleCount)
    .forEach(img => {
      const realIndex = images.indexOf(img);

      gallery.insertAdjacentHTML("beforeend", `
        <div class="gallery-item" data-index="${realIndex}">
          <img src="${img.src}" loading="lazy">
        </div>
      `);
    });
}
render();


/* ================= FILTER ================= */
document.querySelectorAll(".filters button").forEach(btn => {
  btn.addEventListener("click", () => {

    // Remove active from all
    document.querySelectorAll(".filters button")
      .forEach(b => b.classList.remove("active"));

    // Add active to clicked
    btn.classList.add("active");

    // Save filter state
    currentFilter = btn.dataset.filter;

    // Reset count
    visibleCount = 6;

    // Render fresh
    render(currentFilter);
  });
});



/* ================= INFINITE SCROLL ================= */
window.addEventListener("scroll", () => {
  if (lightbox.style.display === "flex") return;

  if (
    window.innerHeight + window.scrollY >=
    document.documentElement.scrollHeight - 120
  ) {
    visibleCount += 4;
    render(currentFilter, true);
  }
});



/* ================= LIGHTBOX ================= */
const lightbox=document.getElementById("lightbox");
const lightImg=document.getElementById("lightImg");
const caption=document.getElementById("caption");
let currentIndex=0;

gallery.onclick=e=>{
  const item=e.target.closest(".gallery-item");
  if(!item) return;
  currentIndex=item.dataset.index;
  open();
};

function open(){
  lightbox.style.display="flex";
  lightImg.src=images[currentIndex].src;
  caption.innerText=images[currentIndex].cap;
  // 🔒 Lock background scroll
  document.body.style.overflow = "hidden";
}
document.getElementById("close").onclick = () => {
  lightbox.style.display = "none";

  // 🔓 Restore background scroll
  document.body.style.overflow = "";
};

document.getElementById("next").onclick=()=>{currentIndex=(+currentIndex+1)%images.length;open();}
document.getElementById("prev").onclick=()=>{currentIndex=(currentIndex-1+images.length)%images.length;open();}

/* Swipe (mobile) */
let startX=0;
lightImg.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
lightImg.addEventListener("touchend",e=>{
  let diff=startX-e.changedTouches[0].clientX;
  if(Math.abs(diff)>50) diff>0?next.click():prev.click();
});
</script>

</body>
</html>
